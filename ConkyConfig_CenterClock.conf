##Feel free to edit

conky.config = {
  console_bar_fill   = '»',
  console_bar_unfill = ' ',
  alignment = 'bottom_middle',
  background = false,
  border_width = 2,
  cpu_avg_samples = 2,
  -- define colours:
  default_color = '#00C75C',  -- Orange
  color1 = '#709080',         -- Kakhi
  color2 = '#b4b4b4',         -- Light Grey
  color3 = '#717373',         -- Light Green
  color4 = '#106882',         -- White
  color5 = '#1493ba',         -- Black
  color6 = '#ffffff',         -- Light aubergine
  font = 'GE Inspira Regular:pixelsize=13',
  default_outline_color = '#1abc9c',  -- Same HTML as current terminal
  default_shade_color = '#1abc9c',  -- Same HTML as current terminal
  double_buffer = true,
  draw_borders = false,
  draw_graph_borders = true,
  draw_outline = false,
  draw_shades = false,
  extra_newline = false,
  format_human_readable=true,
  gap_x = 10,
  gap_y = 10,
  minimum_height = 300,
  minimum_width = 120,
  net_avg_samples = 2,
  no_buffers = true,
  out_to_console = false,
  out_to_ncurses = false,
  out_to_stderr = false,
  out_to_x = true,
  own_window = true,
  own_window_class = 'conky',
  own_window_type = 'desktop',
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  own_window_transparent = false,
  -- set transparency:
  own_window_argb_visual = true,
  own_window_argb_value = 0,
  show_graph_range = false,
  show_graph_scale = false,
  stippled_borders = 0,
  update_interval = 1.0,
  uppercase = false,
  use_spacer = 'none',
  use_xft = true,
};

conky.text = [[
${color5}${offset -6}${font Quicksand, Bold:pixelsize=120}${time %I:%M}${font}
${color6}${font Quicksand, Bold:pixelsize=24}${time %A}${font}${color6}${font Quicksand, Bold:pixelsize=24}${time %B}${font}${color6}${font Quicksand, Bold:pixelsize=24}${time %D}${font}
${color6}${hr}$font
]]
 
